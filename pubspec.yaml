name: go_router_builder
description: >-
  A builder that supports generated strongly-typed route helpers for
  package:go_router
version: 2.3.1
repository: https://github.com/flutter/packages/tree/main/packages/go_router_builder
issue_tracker: https://github.com/flutter/flutter/issues?q=is%3Aissue+is%3Aopen+label%3A%22p%3A+go_router_builder%22

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  analyzer: ^5.13.0
  async: ^2.11.0
  build: ^2.4.1
  build_config: ^1.1.1
  collection: ^1.17.2
  meta: ^1.9.1
  path: ^1.8.3
  source_gen: ^1.4.0
  source_helper: ^1.3.4

dev_dependencies:
  build_test: ^2.2.0
  dart_style: ^2.3.2
  go_router:
    git: https://github.com/kumsumit/go_router.git
  test: ^1.24.3

topics:
  - codegen
  - deep-linking
  - go-router
  - navigation
